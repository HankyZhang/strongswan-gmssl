connections {
    gmsm-psk-test {
        version = 2
        # IKE SA proposals - 使用标准算法先测试
        proposals = aes256-sha256-modp2048
        
        local_addrs = 0.0.0.0
        
        local {
            auth = psk
            id = vpn-server@test.com
        }
        
        remote {
            auth = psk
            id = vpn-client@test.com
        }
        
        children {
            gmsm-net {
                local_ts = 0.0.0.0/0
                # ESP proposals - 尝试使用 GMSM 算法
                # 根据 swanctl --list-algs 输出，GMSM 提供了:
                # - HMAC_SM3_96 (integrity)
                # - HASH_SM3 (hasher)
                # - PRF_HMAC_SM3 (prf)
                # 但 SM4 加密算法显示为数字 (1031/1032)
                # 先用标准算法测试
                esp_proposals = aes256-sha256
                mode = tunnel
                dpd_action = clear
            }
        }
        
        pools = roadwarrior-pool
    }
}

pools {
    roadwarrior-pool {
        addrs = 10.10.10.0/24
        dns = 8.8.8.8, 114.114.114.114
    }
}

secrets {
    ike-psk {
        id-server = vpn-server@test.com
        id-client = vpn-client@test.com
        secret = "GmSM_VPN_Test_2025"
    }
}
