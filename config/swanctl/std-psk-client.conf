connections {
    std-client {
        version = 2
        local_addrs = %any
        remote_addrs = 101.126.148.5
        
        # 使用标准算法（与服务器端匹配）
        proposals = aes256-sha256-modp2048
        
        local {
            auth = psk
            id = vpn-client@test.com
        }
        
        remote {
            auth = psk
            id = vpn-server@test.com
        }
        
        children {
            std-tunnel {
                # 客户端请求动态 IP
                local_ts = 0.0.0.0/0
                remote_ts = 0.0.0.0/0
                
                # ESP 使用标准算法
                esp_proposals = aes256-sha256
                
                start_action = start
                close_action = restart
                dpd_action = restart
                mode = tunnel
            }
        }
        
        # 请求虚拟 IP
        vips = 0.0.0.0
    }
}

secrets {
    ike-std {
        id-client = vpn-client@test.com
        id-server = vpn-server@test.com
        secret = "GmSM_VPN_Test_2025"
    }
}
