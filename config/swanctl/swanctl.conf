connections {
   #########################################################################
   # 一. 基于 PSK 的连接 (保留以对比)
   #########################################################################
   a-to-b-sm4gcm {
      version = 2
      local_addrs  = 101.126.148.5
      remote_addrs = 8.140.37.32
      proposals = sm4gcm-prfsm3-modp2048, sm4-sm3-prfsm3-modp2048
      local { id = host-a; auth = psk }
      remote { id = host-b; auth = psk }
      children {
         a-to-b-net {
            local_ts  = 10.10.0.0/24
            remote_ts = 10.20.0.0/24
            esp_proposals = sm4gcm
            start_action = start
            dpd_action = restart
         }
      }
   }
   b-to-a-sm4gcm {
      version = 2
      local_addrs  = 8.140.37.32
      remote_addrs = 101.126.148.5
      proposals = sm4gcm-prfsm3-modp2048, sm4-sm3-prfsm3-modp2048
      local { id = host-b; auth = psk }
      remote { id = host-a; auth = psk }
      children {
         b-to-a-net {
            local_ts  = 10.20.0.0/24
            remote_ts = 10.10.0.0/24
            esp_proposals = sm4gcm
            start_action = start
            dpd_action = restart
         }
      }
   }
   #########################################################################
   # 二. 基于 SM2 证书认证的连接 (新)
   # 假设镜像中已生成:
   #   /etc/swanctl/x509ca/cacert.pem
   #   /etc/swanctl/x509/servercert.pem (服务器A或B根据角色挂载不同证书)
   #   /etc/swanctl/private/serverkey.pem
   #   /etc/swanctl/x509/clientcert.pem (另一端证书)
   #########################################################################
   a-to-b-sm2gcm {
      version = 2
      local_addrs  = 101.126.148.5
      remote_addrs = 8.140.37.32
      proposals = sm4gcm-prfsm3-modp2048, sm4-sm3-prfsm3-modp2048
      local {
         auth = pubkey
         id = host-a
      certs = servercert-std.pem
      }
      remote {
         auth = pubkey
         id = host-b
         # 对端证书用于匹配公钥 ID，强制验证 CA 链
      }
      children {
         a-to-b-net-sm2 {
            local_ts  = 10.10.0.0/24
            remote_ts = 10.20.0.0/24
            esp_proposals = sm4gcm, sm4-sm3
            start_action = start
         }
      }
   }
   b-to-a-sm2gcm {
      version = 2
      local_addrs  = 8.140.37.32
      remote_addrs = 101.126.148.5
      proposals = sm4gcm-prfsm3-modp2048, sm4-sm3-prfsm3-modp2048
      local {
         auth = pubkey
         id = host-b
      certs = servercert-std.pem
      }
      remote {
         auth = pubkey
         id = host-a
      }
      children {
         b-to-a-net-sm2 {
            local_ts  = 10.20.0.0/24
            remote_ts = 10.10.0.0/24
            esp_proposals = sm4gcm, sm4-sm3
            start_action = start
         }
      }
   }
}

secrets {
   #########################################################################
   # PSK 密钥 (老方式)
   #########################################################################
   ike-a-b { id-local = host-a; id-remote = host-b; secret = "TestSm4GcmPsk!2025" }
   ike-b-a { id-local = host-b; id-remote = host-a; secret = "TestSm4GcmPsk!2025" }
   #########################################################################
   # SM2 私钥 (镜像生成的 serverkey.pem / clientkey.pem 由 swanctl 自动加载)
   # 不需要在 secrets 中声明，只需放置于 /etc/swanctl/private/
   #########################################################################
}
