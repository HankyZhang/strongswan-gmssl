connections {
    gmsm-roadwarrior {
        version = 2
        # IKE SA 使用国密算法套件
        # 格式: 密钥交换-完整性-加密-PRF-DH组
        proposals = sm4cbc128-sm3-sm3-modp2048
        
        local_addrs = 0.0.0.0
        
        local {
            auth = pubkey
            certs = server-cert.pem
            id = "CN=vpn.test.com"
        }
        
        remote {
            auth = pubkey
            # 允许任意客户端连接
        }
        
        children {
            gmsm-net {
                local_ts = 0.0.0.0/0
                # ESP SA 使用国密算法
                # 格式: 加密-完整性
                esp_proposals = sm4cbc128-sm3
                mode = tunnel
                pools = roadwarrior-pool
                dpd_action = clear
            }
        }
    }
}

pools {
    roadwarrior-pool {
        addrs = 10.10.10.0/24
        dns = 8.8.8.8, 114.114.114.114
    }
}

secrets {
    private-server {
        file = server-key.pem
    }
}
