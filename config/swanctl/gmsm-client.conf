connections {
    gmsm-vpn {
        version = 2
        # IKE SA 使用国密算法套件
        proposals = sm4cbc128-sm3-sm3-modp2048
        
        # 远程服务器地址 (需要修改为实际服务器IP)
        remote_addrs = 101.126.148.5
        
        local {
            auth = pubkey
            certs = client-cert.pem
            id = "CN=client.test.com"
        }
        
        remote {
            auth = pubkey
            id = "CN=vpn.test.com"
        }
        
        children {
            gmsm-net {
                remote_ts = 0.0.0.0/0
                # ESP SA 使用国密算法
                esp_proposals = sm4cbc128-sm3
                mode = tunnel
                start_action = none
                dpd_action = restart
                close_action = restart
            }
        }
    }
}

secrets {
    private-client {
        file = client-key.pem
    }
}
