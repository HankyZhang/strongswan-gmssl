connections {
    gmsm-server {
        version = 2
        # IKE SA 算法套件: 密钥交换-PRF-加密
        proposals = sm2-sm3-sm4cbc
        local_addrs = 0.0.0.0
        
        local {
            auth = pubkey
            certs = server-cert.pem
            id = 101.126.148.5
        }
        
        remote {
            auth = pubkey
            # 允许任何客户端连接
        }
        
        children {
            gmsm-tunnel {
                local_ts = 0.0.0.0/0
                # ESP SA 算法套件: 加密-完整性
                esp_proposals = sm4cbc-sm3
                mode = tunnel
                # 为客户端分配 IP 地址池
                pools = vpn-pool
            }
        }
    }
}

pools {
    vpn-pool {
        addrs = 10.10.10.0/24
    }
}

secrets {
    private-server {
        file = /etc/swanctl/private/server-key.pem
    }
}

# 服务器端配置说明:
# - 监听所有接口 (local_addrs = 0.0.0.0)
# - 使用 SM2 服务器证书认证
# - 为客户端分配 10.10.10.0/24 网段的 IP
# - 使用国密算法: SM2 + SM3 + SM4
