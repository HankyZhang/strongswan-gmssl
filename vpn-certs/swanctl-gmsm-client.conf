connections {
    gmsm-client {
        version = 2
        # IKE SA 算法: 使用 SM4-SM3-MODP2048
        proposals = sm4-sm3-modp2048
        remote_addrs = 101.126.148.5
        
        local {
            auth = psk
            id = client.vpn.local
        }
        
        remote {
            auth = psk
            id = server.vpn.local
        }
        
        children {
            gmsm-tunnel {
                remote_ts = 0.0.0.0/0
                # ESP SA 算法: SM4-SM3
                esp_proposals = sm4-sm3
                mode = tunnel
                start_action = start
            }
        }
    }
}

secrets {
    ike-gmsm {
        id = client.vpn.local
        secret = "StrongGmsmPassword123!"
    }
}

# 国密算法VPN客户端配置 (PSK方式)
# IKE: SM4_CBC-128/HMAC_SM3_96/PRF_HMAC_SM3/MODP_2048
# ESP: SM4_CBC-128/HMAC_SM3_96
# 连接到服务器: 101.126.148.5
