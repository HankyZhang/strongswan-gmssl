connections {
    gmsm-server {
        version = 2
        # IKE SA 算法: 使用 SM4-SM3-MODP2048
        proposals = sm4-sm3-modp2048
        local_addrs = 0.0.0.0
        
        local {
            auth = psk
            id = server.vpn.local
        }
        
        remote {
            auth = psk
        }
        
        children {
            gmsm-tunnel {
                local_ts = 0.0.0.0/0
                # ESP SA 算法: SM4-SM3
                esp_proposals = sm4-sm3
                mode = tunnel
                # 为客户端分配 IP 地址池
                pools = vpn-pool
            }
        }
    }
}

pools {
    vpn-pool {
        addrs = 10.10.10.0/24
    }
}

secrets {
    ike-gmsm {
        id = server.vpn.local
        secret = "StrongGmsmPassword123!"
    }
}

# 国密算法VPN配置 (PSK方式)
# IKE: SM4_CBC-128/HMAC_SM3_96/PRF_HMAC_SM3/MODP_2048
# ESP: SM4_CBC-128/HMAC_SM3_96
