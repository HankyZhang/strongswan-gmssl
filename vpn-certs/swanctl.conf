connections {
    gmsm-client {
        version = 2
        # IKE SA 算法套件: 密钥交换-PRF-加密
        proposals = sm2-sm3-sm4cbc
        remote_addrs = 101.126.148.5
        
        local {
            auth = pubkey
            certs = client-cert.pem
            id = vpn-client
        }
        
        remote {
            auth = pubkey
            id = 101.126.148.5
        }
        
        children {
            gmsm-tunnel {
                remote_ts = 0.0.0.0/0
                # ESP SA 算法套件: 加密-完整性 (2个算法)
                # ESP 不需要密钥交换，因为已在 IKE 阶段完成
                esp_proposals = sm4cbc-sm3
                mode = tunnel
                # 可选: 指定 DH 组用于 PFS (Perfect Forward Secrecy)
                # dh_group = sm2_256
            }
        }
    }
}

secrets {
    private-client {
        file = /certs/client-key.pem
    }
}

# 算法说明:
# IKE SA (第一阶段): sm2-sm3-sm4cbc
#   - sm2:    密钥交换算法 (256位椭圆曲线)
#   - sm3:    PRF 伪随机函数
#   - sm4cbc: 加密算法 (128位分组)
#
# ESP SA (第二阶段): sm4cbc-sm3
#   - sm4cbc: 数据加密算法
#   - sm3:    完整性/认证算法 (HMAC-SM3)

